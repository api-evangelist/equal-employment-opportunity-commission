aid: equal-employment-opportunity-commission
name: Equal Employment Opportunity Commission
description: >-
  The U.S. Equal Employment Opportunity Commission (EEOC) is responsible
  for enforcing federal laws that make it illegal to discriminate against
  a job applicant or an employee because of the person's race, color,
  religion, sex (including pregnancy, childbirth, or related conditions,
  gender identity, and sexual orientation), national origin, age (40 or
  older), disability or genetic information. EEOC publishes EEO-1, EEO-3,
  EEO-4, and EEO-5 workforce demographic data through the EEOC Explore
  data querying tool and downloadable bulk data files, but does not
  currently publish a public REST API for programmatic data access.
